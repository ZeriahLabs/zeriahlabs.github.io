<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Math Junior | Zeriah Labs</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <link rel="stylesheet" href="/css/style.css">
  
  <style>
    .math-junior-board {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(180deg, #1e293b, #0f172a);
      border-radius: 24px;
      padding: 30px;
      border: 4px solid var(--brand);
      box-shadow: 0 10px 40px rgba(0, 208, 255, 0.2);
      text-align: center;
    }
    .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .game-title { margin: 0; font-size: 2rem; font-weight: 900; color: var(--brand2); }
    .basket-tracker { background: rgba(255, 255, 255, 0.1); padding: 10px 20px; border-radius: 99px; font-size: 1.2rem; font-weight: 900; color: #fff; }
    .visual-math-area { font-size: 3rem; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; min-height: 80px; }
    .abstract-math { font-size: 4rem; font-weight: 900; color: #fff; margin-bottom: 40px; letter-spacing: 5px; }
    .choices-container { display: flex; justify-content: center; gap: 20px; }
    .math-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: #07101a;
      background: var(--brand);
      border: none;
      border-radius: 20px;
      width: 90px;
      height: 90px;
      cursor: pointer;
      box-shadow: 0 8px 0 #0099cc;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .math-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #0099cc; }
    
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop { animation: popIn 0.4s ease-out forwards; }
  </style>
</head>
<body>

  <header>
    <div class="wrap nav">
      <a href="../index.html" class="brand">
        <img src="https://assets.zeriahlabs.com/Zeriah_Labs_Vertical_Final.webp" alt="Zeriah Labs logo">
        <span>Zeriah Labs</span>
      </a>
      <a href="javascript:void(0)" id="login-btn" class="links primary" style="padding:8px 16px; border-radius:12px; font-weight:700; text-decoration:none;">Sign In / Register</a>
    </div>
  </header>

  <main class="wrap dashboard-layout">
    <section>
      <a href="../index.html" style="color: var(--brand); text-decoration: none; font-weight: 700;">← Back to Dashboard</a>
      
      <div class="math-junior-board" style="margin-top: 20px;">
        <div class="game-header">
          <h2 class="game-title">Math Junior</h2>
          <div class="basket-tracker">
            Basket: <span id="basket-count">0</span> / 5 🍎
          </div>
        </div>

        <div id="start-screen" style="padding: 40px 0;">
          <div class="animate-pop" style="font-size: 5rem; margin-bottom: 20px;">🐵</div>
          <h3 style="color: #eef6ff; font-size: 1.5rem; margin-bottom: 30px;">Ready to count some bananas?</h3>
          <button id="start-btn" class="math-btn animate-pop" style="width: auto; padding: 0 40px; font-size: 2rem;">Play!</button>
        </div>

        <div id="game-screen" style="display: none;">
          <div class="visual-math-area" id="visual-math"></div>
          <div class="abstract-math" id="abstract-math"></div>
          <div class="choices-container" id="choices-container"></div>
        </div>
      </div>
    </section>

    <aside class="achievements-panel">
      <h2>🏆 Achievements</h2>
      <div class="user-progress">
        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 700;">
          <span>Level 1 Rookie</span>
          <span style="color: var(--brand);">0 / 1000 XP</span>
        </div>
        <div class="xp-bar"><div class="xp-fill" style="width: 0%;"></div></div>
      </div>
      <div class="achievement-list">
        <div class="achievement-item">
          <div class="achievement-badge">🧮</div>
          <div class="achievement-info">
            <h4>Basket Filled!</h4>
            <p>Complete 5 visual math equations.</p>
          </div>
          <div class="achievement-points">50 XP</div>
        </div>
      </div>
    </aside>
  </main>

  <div id="auth-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
    <div style="background: var(--bg); padding: 32px; border-radius: var(--r); border: 1px solid var(--rule); width: 100%; max-width: 400px; box-shadow: var(--shadow);">
      <h2 id="auth-title" style="margin-top: 0; font-size: 1.5rem;">Sign In</h2>
      <p id="auth-error" style="color: #ef4444; font-size: 0.85rem; display: none; margin-top: -10px;"></p>
      <p id="auth-success" style="color: var(--brand2); font-size: 0.85rem; display: none; margin-top: -10px;"></p>
      
      <form id="auth-form" style="display: flex; flex-direction: column; gap: 16px;">
        <input type="email" id="email" placeholder="Email Address" required style="padding: 12px; border-radius: 8px; border: 1px solid var(--rule); background: rgba(255,255,255,0.05); color: var(--ink);">
        
        <input type="text" id="sec-question" placeholder="Security Question (e.g. Favorite Game)" style="display:none; padding: 12px; border-radius: 8px; border: 1px solid var(--rule); background: rgba(255,255,255,0.05); color: var(--ink);">
        <input type="text" id="sec-answer" placeholder="Your Answer" style="display:none; padding: 12px; border-radius: 8px; border: 1px solid var(--rule); background: rgba(255,255,255,0.05); color: var(--ink);">

        <div id="password-container" style="position: relative; display: flex; align-items: center;">
          <input type="password" id="password" placeholder="Password" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--rule); background: rgba(255,255,255,0.05); color: var(--ink);">
          <button id="toggle-password" style="position: absolute; right: 12px; background: none; border: none; cursor: pointer; font-size: 1.2rem;">👁️</button>
        </div>
        
        <button type="submit" style="padding: 12px; border-radius: 8px; background: linear-gradient(90deg, var(--brand), var(--brand2)); border: none; color: #001016; font-weight: 800; cursor: pointer;">Submit</button>
      </form>

      <div style="margin-top: 16px; text-align: center; font-size: 0.9rem; color: var(--muted); display: flex; flex-direction: column; gap: 10px;">
        <div>
          <span id="auth-switch-text">Don't have an account?</span> 
          <a href="#" id="auth-switch" style="color: var(--brand); font-weight: bold; text-decoration: none;">Register here</a>
        </div>
        <a href="#" id="forgot-link" style="color: var(--muted); text-decoration: underline; font-size: 0.85rem;">Forgot password?</a>
      </div>
      <button id="close-modal" style="background: none; border: none; color: var(--muted); margin-top: 16px; width: 100%; cursor: pointer; font-weight: bold;">Cancel</button>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="math-engine.js"></script>

</body>
</html>
