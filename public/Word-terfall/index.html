<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word-terfall | Zeriah Labs</title>
    <style>
        :root {
          --bg:#07131c;
          --panel:rgba(255,255,255,.05);
          --panel2:rgba(255,255,255,.035);
          --ink:#eef6ff;
          --muted:#a9bfd2;
          --rule:rgba(255,255,255,.10);
          --brand:#00d0ff;
          --brand2:#22e3b1;
          --purple:#a855f7;
          --max:1200px;
          --r:16px;
          --shadow:0 18px 70px rgba(0,0,0,.55);
        }

        *{box-sizing:border-box}
        html, body { min-height: 100%; margin: 0; }

        body {
          font:16px/1.6 system-ui,-apple-system,Segoe UI,Inter,Roboto,Arial;
          color:var(--ink);
          background-color: #07101a;
          background-image:
            radial-gradient(900px 520px at 20% 0%, rgba(34,227,177,.14), transparent 55%),
            radial-gradient(900px 520px at 85% 10%, rgba(0,208,255,.12), transparent 55%),
            linear-gradient(180deg, #061018 0%, #07131c 55%, #07101a 100%);
          background-repeat: no-repeat;
          background-attachment: fixed;
          display: flex;
          flex-direction: column;
        }

        .wrap {
          max-width: var(--max);
          margin: 0 auto;
          padding: 0 24px;
          width: 100%;
          flex: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding-bottom: 80px;
        }

        header {
          position: sticky; 
          top: 0; 
          z-index: 50;
          backdrop-filter: saturate(150%) blur(10px);
          background: rgba(7,19,28,.72);
          border-bottom: 1px solid var(--rule);
          width: 100%;
        }

        .global-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          background-color: #0b131a; 
          padding: 15px 30px;
          border-bottom: 1px solid rgba(255,255,255,0.05);
          width: 100%;
        }

        .brand-container { 
          display: flex; 
          align-items: center; 
          gap: 15px; 
          font-size: 1.3rem; 
          font-weight: 900; 
          color: var(--ink);
          text-decoration: none;
        }

        .user-badge {
          display: flex;
          align-items: center;
          gap: 15px;
          background-color: rgba(255,255,255,0.05);
          padding: 8px 15px;
          border-radius: 8px;
          border: 1px solid rgba(255,255,255,0.1);
          font-weight: 700;
          color: var(--ink);
        }

        .breadcrumb { 
          width: 100%;
          margin: 20px 0; 
          text-align: left; 
        }

        .back-link {
          color: var(--brand2);
          text-decoration: none;
          font-weight: 900;
          font-size: 1.1rem;
          transition: opacity 0.2s;
        }

        .back-link:hover { opacity: 0.8; }

        h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 8px; letter-spacing: 0.5px; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }

        .game-info {
          display: flex;
          gap: 16px;
          align-items: center;
          margin-bottom: 24px;
          color: var(--muted);
          font-weight: 600;
          background: rgba(0,0,0,0.3);
          padding: 6px 20px;
          border-radius: 99px;
          border: 1px solid var(--rule);
        }

        .timer { font-family: monospace; font-size: 1.25rem; color: var(--ink); }
        .timer.urgent { color: #ef4444; animation: pulse 1s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .status-box { height: 32px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; }
        .status-msg { font-size: 1.1rem; font-weight: 700; color: #facc15; animation: pulse 1.5s infinite; text-shadow: 0 2px 10px rgba(250, 204, 21, 0.3); }

        .grid-container { display: flex; flex-direction: column; gap: 8px; align-items: center; perspective: 1000px; }
        .row { display: flex; gap: 8px; }
        
        /* ENHANCED TILES */
        .tile {
          width: 60px;
          height: 60px;
          border: 2px solid rgba(255,255,255,0.15);
          background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
          box-shadow: inset 0 2px 4px rgba(255,255,255,0.05), 0 4px 10px rgba(0,0,0,0.2);
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 2rem;
          font-weight: 900;
          text-transform: uppercase;
          border-radius: 12px;
          transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .tile.active { 
          border-color: var(--brand); 
          box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 0 20px rgba(0,208,255,0.3); 
          transform: scale(1.05);
        }
        
        .tile.correct { 
          background: linear-gradient(180deg, var(--brand2), #14b8a6); 
          border-color: #14b8a6; 
          color: #03080c; 
          box-shadow: 0 0 25px rgba(34,227,177,0.5); 
        }
        
        .tile.present { 
          background: linear-gradient(180deg, #facc15, #ca8a04); 
          border-color: #a16207; 
          color: #03080c; 
          box-shadow: 0 0 20px rgba(234, 179, 8, 0.4); 
        }
        
        .tile.absent { 
          background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); 
          border-color: rgba(255,255,255,0.05); 
          color: rgba(255,255,255,0.2); 
          box-shadow: none;
        }

        .keyboard {
          margin-top: 32px;
          display: flex;
          flex-direction: column;
          gap: 8px;
          width: 100%;
          max-width: 500px;
          padding: 0 10px;
          z-index: 10;
        }

        .kb-row { display: flex; gap: 6px; justify-content: center; width: 100%; }
        
        /* 3D TACTILE KEYS */
        .key {
          flex: 1;
          height: 58px;
          background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
          border: 1px solid rgba(255,255,255,0.1);
          border-radius: 8px;
          color: var(--ink);
          font-weight: 800;
          font-size: 1.1rem;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          user-select: none;
          box-shadow: 0 4px 0 rgba(0,0,0,0.5), 0 6px 15px rgba(0,0,0,0.3);
          transform: translateY(0);
          transition: all 0.1s;
        }

        .key.wide { flex: 1.5; font-size: 0.9rem; }
        
        .key:hover { 
          background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08)); 
        }
        
        .key:active {
          box-shadow: 0 0 0 rgba(0,0,0,0.5), 0 2px 5px rgba(0,0,0,0.3);
          transform: translateY(4px);
        }
        
        .key.correct { background: linear-gradient(180deg, var(--brand2), #14b8a6); color: #03080c; border-color: transparent; }
        .key.present { background: linear-gradient(180deg, #facc15, #ca8a04); color: #03080c; border-color: transparent; }
        .key.absent { background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.2); box-shadow: 0 2px 0 rgba(0,0,0,0.3); transform: translateY(2px); }

        /* MODAL */
        .modal-overlay {
          position: fixed;
          top: 0; left: 0; width: 100%; height: 100%;
          background-color: rgba(0,0,0,0.8);
          display: none;
          align-items: center;
          justify-content: center;
          z-index: 100;
          backdrop-filter: blur(8px);
        }

        .modal {
          background: linear-gradient(180deg, #0b131a, #07101a);
          border: 1px solid var(--rule);
          padding: 40px;
          border-radius: 24px;
          box-shadow: 0 20px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
          display: flex;
          flex-direction: column;
          align-items: center;
          width: 360px;
        }

        .modal h2 { margin-top: 0; margin-bottom: 24px; letter-spacing: 2px; font-weight: 900; }
        
        .stats-grid { display: flex; gap: 20px; margin-bottom: 32px; width: 100%; justify-content: space-between; }
        .stat-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .stat-val { font-size: 2.5rem; font-weight: 900; color: var(--brand2); text-shadow: 0 0 15px rgba(34,227,177,0.3); }
        .stat-lbl { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;}

        .btn-primary {
          background: linear-gradient(90deg, var(--brand), var(--brand2));
          color: #001016;
          border: none;
          padding: 14px 40px;
          font-weight: 900;
          border-radius: 12px;
          cursor: pointer;
          font-size: 1.1rem;
          transition: all 0.2s;
          box-shadow: 0 4px 15px rgba(34,227,177,0.3);
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34,227,177,0.4); }
        .btn-primary:active { transform: translateY(1px); box-shadow: 0 2px 10px rgba(34,227,177,0.3); }
    </style>
</head>
<body>

    <header>
        <div class="global-header">
            <a href="https://zeriahlabs.com" class="brand-container">
                <span>Zeriah Labs</span>
            </a>
            <div class="user-badge">
                <span>Word-terfall</span>
            </div>
        </div>
    </header>

    <div class="wrap">
        <div class="breadcrumb">
            <a href="https://zeriahlabs.com" class="back-link">← Back to Dashboard</a>
        </div>

        <h1>Word-terfall</h1>
        
        <div class="game-info">
            <span id="level-indicator">Loading...</span>
            <span>|</span>
            <span id="timer" class="timer">00:00</span>
        </div>

        <div class="status-box">
            <span id="status-msg" class="status-msg">Fetching Dictionary Data...</span>
        </div>

        <div id="game-grid" class="grid-container"></div>

        <div class="keyboard" id="keyboard">
            <div class="kb-row">
                <button class="key" data-key="Q">Q</button><button class="key" data-key="W">W</button><button class="key" data-key="E">E</button><button class="key" data-key="R">R</button><button class="key" data-key="T">T</button><button class="key" data-key="Y">Y</button><button class="key" data-key="U">U</button><button class="key" data-key="I">I</button><button class="key" data-key="O">O</button><button class="key" data-key="P">P</button>
            </div>
            <div class="kb-row">
                <button class="key" data-key="A">A</button><button class="key" data-key="S">S</button><button class="key" data-key="D">D</button><button class="key" data-key="F">F</button><button class="key" data-key="G">G</button><button class="key" data-key="H">H</button><button class="key" data-key="J">J</button><button class="key" data-key="K">K</button><button class="key" data-key="L">L</button>
            </div>
            <div class="kb-row">
                <button class="key wide" data-key="Enter">Enter</button><button class="key" data-key="Z">Z</button><button class="key" data-key="X">X</button><button class="key" data-key="C">C</button><button class="key" data-key="V">V</button><button class="key" data-key="B">B</button><button class="key" data-key="N">N</button><button class="key" data-key="M">M</button><button class="key wide" data-key="Backspace">⌫</button>
            </div>
        </div>
    </div>

    <!-- STATS MODAL -->
    <div id="stats-modal" class="modal-overlay">
        <div class="modal">
            <h2>STATISTICS</h2>
            <div class="stats-grid">
                <div class="stat-item"><span id="stat-played" class="stat-val">0</span><span class="stat-lbl">Played</span></div>
                <div class="stat-item"><span id="stat-win" class="stat-val">0</span><span class="stat-lbl">Win %</span></div>
                <div class="stat-item"><span id="stat-streak" class="stat-val">0</span><span class="stat-lbl">Streak</span></div>
                <div class="stat-item"><span id="stat-max" class="stat-val">0</span><span class="stat-lbl">Max</span></div>
            </div>
            <button class="btn-primary" onclick="closeModal()">Continue</button>
        </div>
    </div>

    <script>
        // --- DYNAMIC DICTIONARY LOADER ---
        let TARGETS = {};
        let ALL_WORDS = new Set();
        let dictionariesReady = false;

        async function loadExternalDictionaries() {
            try {
                // Fetch the 4 JSON files directly from the same folder
                const [res4, res5, res6, res7] = await Promise.all([
                    fetch('targets_4.json'),
                    fetch('targets_5.json'),
                    fetch('targets_6.json'),
                    fetch('targets_7.json')
                ]);

                if (!res4.ok || !res5.ok || !res6.ok || !res7.ok) {
                    throw new Error("One or more files missing on server.");
                }

                const t4 = await res4.json();
                const t5 = await res5.json();
                const t6 = await res6.json();
                const t7 = await res7.json();

                TARGETS = { 0: t4, 1: t5, 2: t6, 3: t7 };
                ALL_WORDS = new Set([...t4, ...t5, ...t6, ...t7]);
                
                dictionariesReady = true;
                document.getElementById("status-msg").innerText = "";
                
                // Boot the game now that data is loaded
                initGame();
            } catch (error) {
                console.warn("Could not load external JSONs (expected in preview/local mode), using fallback dictionaries.", error);
                
                // Fallback dictionaries so the game can still be previewed without failing
                const t4 = ["CODE", "DATA", "FLOW", "NODE", "BYTE", "SYNC"];
                const t5 = ["WORLD", "THERE", "ABOUT", "WHICH", "TRAIN", "SOUND"];
                const t6 = ["SYSTEM", "STREAM", "UPDATE", "MATRIX", "VECTOR", "CLIENT"];
                const t7 = ["NETWORK", "PROJECT", "DIGITAL", "PROGRAM", "VERSION", "RELEASE"];

                TARGETS = { 0: t4, 1: t5, 2: t6, 3: t7 };
                ALL_WORDS = new Set([...t4, ...t5, ...t6, ...t7, "ROUTER", "SERVER", "LOGIC", "ENGINE", "CLOUD"]);
                
                dictionariesReady = true;
                document.getElementById("status-msg").innerText = "";
                
                // Boot the game using fallbacks
                initGame();
            }
        }

        // --- EPOCH ENGINE ---
        function getEpochDay() {
            const now = new Date();
            const utcNow = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
            return Math.floor(utcNow / (1000 * 60 * 60 * 24));
        }

        function getDailyWord(level) {
            const list = TARGETS[level];
            const index = getEpochDay() % list.length;
            return list[index];
        }

        // --- GAME STATE ---
        let currentLevel = 0;
        let targetWord = "";
        let currentGuess = "";
        let guesses = [];
        let turn = 0;
        let gameEnded = false;
        let timeLeft = 180;
        let timerInterval = null;
        let completedRowsHTML = "";

        // Stats tracking
        let stats = JSON.parse(localStorage.getItem("wordterfall_stats")) || { played: 0, wins: 0, currentStreak: 0, maxStreak: 0, lastEpoch: 0 };

        function initGame() {
            targetWord = getDailyWord(currentLevel);
            currentGuess = "";
            guesses = Array(6).fill("");
            turn = 0;
            gameEnded = false;
            completedRowsHTML = "";
            document.getElementById("level-indicator").innerText = `Level ${currentLevel + 1} (${targetWord.length} Letters)`;
            renderGrid();
            resetKeyboardColors();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameEnded) return;
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    triggerGameOver(false);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            const el = document.getElementById("timer");
            el.innerText = `${m}:${s}`;
            if (timeLeft <= 30) el.classList.add("urgent");
            else el.classList.remove("urgent");
        }

        function renderGrid() {
            if (!dictionariesReady) return;
            const grid = document.getElementById("game-grid");
            let html = completedRowsHTML;

            if (!gameEnded || currentLevel < Object.keys(TARGETS).length - 1) {
                for (let r = 0; r < 6; r++) {
                    html += `<div class="row">`;
                    const wordLen = targetWord.length;
                    const displayVal = (r === turn) ? currentGuess.padEnd(wordLen, " ") : guesses[r].padEnd(wordLen, " ");
                    
                    for (let c = 0; c < wordLen; c++) {
                        let char = displayVal[c] !== " " ? displayVal[c] : "";
                        let statusClass = "";
                        
                        if (r < turn) {
                            statusClass = getTileStatus(guesses[r], targetWord, c);
                        } else if (r === turn && c === currentGuess.length) {
                            statusClass = "active";
                        }
                        
                        html += `<div class="tile ${statusClass}">${char}</div>`;
                    }
                    html += `</div>`;
                }
            }
            grid.innerHTML = html;
        }

        function getTileStatus(guess, target, index) {
            const gChar = guess[index];
            const tChar = target[index];
            if (gChar === tChar) return "correct";
            if (target.includes(gChar)) return "present";
            return "absent";
        }

        // --- INPUT HANDLING ---
        window.addEventListener("keydown", (e) => {
            if (gameEnded || !dictionariesReady) return;
            if (e.key === "Backspace") handleBackspace();
            else if (e.key === "Enter") handleEnter();
            else if (/^[a-zA-Z]$/.test(e.key)) handleLetter(e.key.toUpperCase());
        });

        document.getElementById("keyboard").addEventListener("click", (e) => {
            const btn = e.target.closest(".key");
            if (!btn || gameEnded || !dictionariesReady) return;
            const key = btn.getAttribute("data-key");
            
            // Visual click feedback
            btn.style.transform = "translateY(4px)";
            btn.style.boxShadow = "0 0 0 rgba(0,0,0,0.5), 0 2px 5px rgba(0,0,0,0.3)";
            setTimeout(() => {
                btn.style.transform = "";
                btn.style.boxShadow = "";
            }, 100);

            if (key === "Backspace") handleBackspace();
            else if (key === "Enter") handleEnter();
            else handleLetter(key);
        });

        function handleLetter(letter) {
            if (currentGuess.length < targetWord.length) {
                currentGuess += letter;
                renderGrid();
            }
        }

        function handleBackspace() {
            if (currentGuess.length > 0) {
                currentGuess = currentGuess.slice(0, -1);
                renderGrid();
            }
        }

        function handleEnter() {
            if (currentGuess.length !== targetWord.length) {
                showStatus("Not enough letters!");
                return;
            }
            if (!ALL_WORDS.has(currentGuess)) {
                showStatus("Not in word list!");
                return;
            }

            guesses[turn] = currentGuess;

            updateKeyboardColors(currentGuess, targetWord);

            if (currentGuess === targetWord) {
                // Lock ONLY the winning word into the permanent waterfall above the board
                let rowHtml = `<div class="row" style="margin-bottom: 24px;">`;
                for(let i=0; i<targetWord.length; i++) {
                    rowHtml += `<div class="tile correct" style="box-shadow: 0 0 15px rgba(34,227,177,0.4);">${currentGuess[i]}</div>`;
                }
                rowHtml += `</div>`;
                completedRowsHTML += rowHtml;

                if (currentLevel === Object.keys(TARGETS).length - 1) {
                    gameEnded = true;
                    clearInterval(timerInterval);
                    showStatus("Victory! You beat the Word-terfall!");
                    triggerGameOver(true);
                    renderGrid(); // Render to hide the empty board and show full waterfall
                } else {
                    currentLevel++;
                    showStatus(`Level Up! Moving to ${TARGETS[currentLevel][0].length} letters.`);
                    setTimeout(() => {
                        targetWord = getDailyWord(currentLevel);
                        currentGuess = "";
                        guesses = Array(6).fill("");
                        turn = 0;
                        // Notice we REMOVED the line wiping completedRowsHTML here so they stack!
                        document.getElementById("level-indicator").innerText = `Level ${currentLevel + 1} (${targetWord.length} Letters)`;
                        renderGrid();
                        resetKeyboardColors();
                    }, 1500);
                }
                return;
            }

            if (turn === 5) {
                gameEnded = true;
                clearInterval(timerInterval);
                showStatus(`Game Over! The word was ${targetWord}.`);
                triggerGameOver(false);
            } else {
                turn++;
                currentGuess = "";
                renderGrid();
            }
        }

        function showStatus(msg) {
            const el = document.getElementById("status-msg");
            el.innerText = msg;
            setTimeout(() => { if (el.innerText === msg) el.innerText = ""; }, 2000);
        }

        function updateKeyboardColors(guess, target) {
            for (let i = 0; i < guess.length; i++) {
                const char = guess[i];
                const btn = document.querySelector(`[data-key="${char}"]`);
                if (!btn) continue;
                const status = getTileStatus(guess, target, i);
                
                if (status === "correct") {
                    btn.className = "key correct";
                } else if (status === "present" && !btn.classList.contains("correct")) {
                    btn.className = "key present";
                } else if (status === "absent" && !btn.classList.contains("correct") && !btn.classList.contains("present")) {
                    btn.className = "key absent";
                }
            }
        }

        function resetKeyboardColors() {
            document.querySelectorAll(".key").forEach(btn => {
                const isWide = btn.classList.contains("wide");
                btn.className = isWide ? "key wide" : "key";
            });
        }

        // --- STATS & STORAGE ---
        function triggerGameOver(isWin) {
            const today = getEpochDay();
            if (stats.lastEpoch !== today) {
                stats.played += 1;
                if (isWin) {
                    if (stats.lastEpoch === today - 1) stats.currentStreak += 1;
                    else stats.currentStreak = 1;
                    stats.wins += 1;
                } else {
                    stats.currentStreak = 0;
                }
                stats.maxStreak = Math.max(stats.maxStreak, stats.currentStreak);
                stats.lastEpoch = today;
                localStorage.setItem("wordterfall_stats", JSON.stringify(stats));
            }

            setTimeout(() => {
                document.getElementById("stat-played").innerText = stats.played;
                document.getElementById("stat-win").innerText = stats.played > 0 ? Math.round((stats.wins / stats.played) * 100) : 0;
                document.getElementById("stat-streak").innerText = stats.currentStreak;
                document.getElementById("stat-max").innerText = stats.maxStreak;
                document.getElementById("stats-modal").style.display = "flex";
            }, 1500); // Slight delay so player can admire the full green board
        }

        function closeModal() {
            document.getElementById("stats-modal").style.display = "none";
        }

        // Trigger the fetch to kickstart everything
        loadExternalDictionaries();
    </script>
</body>
</html>
