<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's That Dinosaur? | Zeriah Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Inherit your global styles -->
    <link rel="stylesheet" href="../css/style.css"> 
    
    <style>
        /* Specific Game Layout */
        .game-wrapper {
            background-color: rgba(255,255,255,0.03);
            border: 1px solid var(--rule);
            border-radius: var(--r);
            padding: 30px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .header-stats {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 900;
        }
        
        .timer { color: var(--brand2); }
        .score { color: var(--brand); }

        .dino-image-container {
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .dino-img {
            max-height: 100%;
            max-width: 100%;
            transition: filter 0.2s ease-out, transform 0.3s ease;
            pointer-events: none; 
            user-select: none;
        }

        .silhouette {
            filter: brightness(0) drop-shadow(0 0 10px rgba(0,0,0,0.5));
            transform: scale(0.95);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background-color: rgba(255,255,255,0.05);
            color: var(--ink);
            border: 1px solid var(--rule);
            border-radius: 12px;
            padding: 15px;
            font-size: 1.2rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .option-btn:active { transform: translateY(4px); }
        .option-btn:hover:not(:disabled) { background-color: rgba(255,255,255,0.1); }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }

        .option-btn.correct { background-color: var(--brand2); color: #07101a; border-color: transparent;}
        .option-btn.wrong { background-color: #ef4444; opacity: 0.5; border-color: transparent;}
        
        .primary-btn {
            background-color: var(--brand); 
            color: #07101a; 
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.1s;
        }
        .primary-btn:active { transform: scale(0.95); }
        .primary-btn:disabled { background-color: var(--rule); cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- ZERIAH LABS GLOBAL HEADER -->
    <nav class="global-header">
        <div class="brand-container">
            <!-- Ensure this path points to your actual logo asset -->
            <img src="../assets/logo.png" alt="Zeriah Labs Logo" class="brand-logo" onerror="this.style.display='none'">
            <span>Zeriah Labs</span>
        </div>
        <div class="user-badge">
            <!-- auth.js should dynamically fill this span -->
            <span>👤 <span id="nav-username">timothythiam</span></span>
            <span class="logout-btn" onclick="logout()">[Logout]</span>
        </div>
    </nav>

    <div class="wrap">
        
        <!-- BREADCRUMB NAVIGATION -->
        <div class="breadcrumb">
            <!-- Adjust the href to point to your actual dashboard file -->
            <a href="../index.html" class="back-link">← Back to Dashboard</a>
        </div>

        <div class="dashboard-layout">
            
            <!-- LEFT SIDE: GAME -->
            <div>
                <!-- START SCREEN -->
                <div class="game-wrapper" id="start-screen">
                    <h1 style="font-size: 2.5rem; margin-bottom: 10px; color: var(--brand2);">Who's That Dinosaur?</h1>
                    <p style="color: var(--muted); margin-bottom: 30px;">High-speed flashcard identification.</p>
                    <button id="start-btn" class="primary-btn" onclick="startGame()" disabled>Loading Dinosaurs...</button>
                </div>

                <!-- PLAY SCREEN -->
                <div class="game-wrapper" id="game-screen" style="display: none;">
                    <div class="header-stats">
                        <div class="timer">⏱ <span id="time">60</span>s</div>
                        <div class="score">⭐ <span id="score">0</span></div>
                    </div>

                    <h2 id="question-text" style="font-family: 'Nunito';">Loading...</h2>
                    
                    <div class="dino-image-container">
                        <img id="dino-display" class="dino-img" src="" alt="Dinosaur" style="display: none;">
                    </div>
                    
                    <!-- Legal Attribution Text (Hidden during silhouette phase) -->
                    <div id="attribution-text" style="font-size: 0.75rem; color: var(--muted); margin-bottom: 20px; display: none;"></div>

                    <div class="options-grid" id="options">
                        <!-- Buttons injected by CSV data -->
                    </div>
                </div>

                <!-- GAME OVER SCREEN -->
                <div class="game-wrapper" id="game-over-screen" style="display: none;">
                    <h1>Time's Up!</h1>
                    <h2>You identified <span id="final-score" style="color: var(--brand);">0</span> Dinosaurs!</h2>
                    <p>Paleontology Rank: <strong id="rank" style="color: var(--purple);">Egg</strong></p>
                    <button class="primary-btn" onclick="startGame()">Play Again</button>
                </div>
            </div>

            <!-- RIGHT SIDE: ACHIEVEMENTS -->
            <div class="achievements-panel">
                <h2>🏆 Trophies</h2>
                <div class="user-progress">
                    <div style="display: flex; justify-content: space-between;">
                        <span id="levelText" style="font-weight: bold;">Level 1 Rookie</span>
                        <span id="xpText" style="color: var(--muted); font-size: 0.8rem;">0 / 1000 XP</span>
                    </div>
                    <div class="xp-bar"><div class="xp-fill" id="xpBarFill" style="width: 0%;"></div></div>
                </div>
                <div class="achievement-list" id="achievementsList">
                     <div class="achievement-item locked">
                        <div class="achievement-badge">🦕</div>
                        <div class="achievement-info">
                            <h4>Dino Master</h4>
                            <p>Identify 10 Dinosaurs correctly</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="sound-correct" src="../sounds/yay.mp3"></audio>
    <audio id="sound-wrong" src="../sounds/wrong.mp3"></audio>
    <audio id="bgm" src="../sounds/bgm.mp3" loop></audio>

    <!-- Zeriah Labs Shared Scripts -->
    <script src="../js/auth.js"></script>
    <script src="../js/ui.js"></script>

    <!-- Game Engine & CSV Parser -->
    <script>
        let dinosaurDB = [];
        let currentDino;
        let score = 0;
        let timeLeft = 60;
        let timerInterval;
        let isRevealed = false;
        let streak = 0;
        let previousDino = null;

        const timeEl = document.getElementById('time');
        const scoreEl = document.getElementById('score');
        const dinoDisplay = document.getElementById('dino-display');
        const optionsContainer = document.getElementById('options');
        const questionText = document.getElementById('question-text');
        const attributionEl = document.getElementById('attribution-text');

        // 1. Fetch and Parse the CSV
        async function loadDinosaurCSV() {
            try {
                const response = await fetch('dinos.csv');
                if (!response.ok) throw new Error("CSV not found");
                
                const text = await response.text();
                const rows = text.split('\n').map(r => r.trim()).filter(r => r);
                const dataRows = rows.slice(1); 

                // Map logic: url, opt1, opt2, opt3, opt4, correct, author
                dinosaurDB = dataRows.map(row => {
                    // Handle potential commas inside quotes if Excel exports it that way
                    const cols = row.split(',').map(c => c.trim());
                    if (cols.length >= 7) {
                        return {
                            img: cols[0],
                            options: [cols[1], cols[2], cols[3], cols[4]],
                            name: cols[5],
                            author: cols[6]
                        };
                    }
                    return null;
                }).filter(d => d !== null);

                if(dinosaurDB.length > 0) {
                    // Activate the Start Button
                    const startBtn = document.getElementById('start-btn');
                    startBtn.innerText = "Start Game";
                    startBtn.disabled = false;
                } else {
                    document.getElementById('start-btn').innerText = "Error: CSV is empty";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('start-btn').innerText = "Error loading dinos.csv";
            }
        }

        // 2. Gameplay Loop
        function startGame() {
            score = 0;
            timeLeft = 60;
            streak = 0;
            scoreEl.innerText = score;
            timeEl.innerText = timeLeft;
            
            // Switch Screens
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('game-over-screen').style.display = 'none';

            // Start Audio
            const bgm = document.getElementById('bgm');
            bgm.volume = 0.3; // Lower volume so sounds effects pop
            bgm.play().catch(e => console.log("Audio play failed:", e));

            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            
            loadNextDinosaur();
        }

        function updateTimer() {
            timeLeft--;
            timeEl.innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }

        function loadNextDinosaur() {
            isRevealed = false;
            dinoDisplay.style.display = 'block';
            dinoDisplay.classList.add('silhouette');
            attributionEl.style.display = 'none'; // Hide attribution during question
            questionText.innerText = "Who's That Dinosaur?";
            
            // Pick a random dino, but prevent back-to-back duplicates
            if (dinosaurDB.length > 1) {
                do {
                    currentDino = dinosaurDB[Math.floor(Math.random() * dinosaurDB.length)];
                } while (previousDino && currentDino.name === previousDino.name);
            } else {
                // Failsafe in case your CSV only has 1 dinosaur in it
                currentDino = dinosaurDB[0];
            }
            
            // Save this dino to memory for the next round
            previousDino = currentDino;
            dinoDisplay.src = currentDino.img;

            let shuffledOptions = [...currentDino.options].sort(() => Math.random() - 0.5);

            optionsContainer.innerHTML = '';
            shuffledOptions.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => checkAnswer(option, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedName, btnElement) {
            if (isRevealed) return; 
            isRevealed = true;

            const buttons = document.querySelectorAll('.option-btn');
            
            if (selectedName === currentDino.name) {
                btnElement.classList.add('correct');
                document.getElementById('sound-correct').play();
                
                score++;
                streak++;
                timeLeft += 3; 
                
                scoreEl.innerText = score;
                timeEl.style.color = 'var(--brand2)';
                timeEl.innerText = `+3s`;
                setTimeout(() => { timeEl.style.color = ''; timeEl.innerText = timeLeft; }, 500);

                questionText.innerText = `It's ${currentDino.name}!`;

                if (streak % 5 === 0) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else {
                btnElement.classList.add('wrong');
                document.getElementById('sound-wrong').play();
                
                streak = 0;
                questionText.innerText = `Nope! It's ${currentDino.name}!`;
                
                buttons.forEach(b => {
                    if (b.innerText === currentDino.name) b.classList.add('correct');
                });
            }

            dinoDisplay.classList.remove('silhouette');
            
            // Show compliant CC BY 4.0 attribution
            if(currentDino.author) {
                attributionEl.innerHTML = `Original image by ${currentDino.author} / <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" style="color: inherit; text-decoration: underline;">CC BY 4.0</a> / Modified from original`;
                attributionEl.style.display = 'block';
            }

            setTimeout(loadNextDinosaur, 1500);
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('bgm').pause(); // Stop music
            
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            
            let rank = "Egg";
            if(score > 5) rank = "Hatchling";
            if(score > 15) rank = "Raptor Rider";
            if(score > 30) rank = "T-Rex Master!";
            document.getElementById('rank').innerText = rank;
        }

        // Boot up by loading the CSV (but don't start the timer yet)
        window.onload = loadDinosaurCSV;
    </script>
</body>
</html>
