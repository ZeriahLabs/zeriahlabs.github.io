<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's That Dinosaur? | Zeriah Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="stylesheet" href="../css/style.css"> 
    
    <style>
        /* Specific Game Layout */
        .game-wrapper {
            background-color: rgba(255,255,255,0.03);
            border: 1px solid var(--rule);
            border-radius: var(--r);
            padding: 30px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .header-stats {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 900;
        }
        
        .timer { color: var(--brand2); }
        .score { color: var(--brand); }

        .dino-image-container {
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .dino-img {
            max-height: 100%;
            max-width: 100%;
            transition: filter 0.2s ease-out, transform 0.3s ease;
            pointer-events: none; 
            user-select: none;
        }

        .silhouette {
            filter: brightness(0) drop-shadow(0 0 10px rgba(0,0,0,0.5));
            transform: scale(0.95);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background-color: rgba(255,255,255,0.05);
            color: var(--ink);
            border: 1px solid var(--rule);
            border-radius: 12px;
            padding: 15px;
            font-size: 1.2rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .option-btn:active { transform: translateY(4px); }
        .option-btn:hover { background-color: rgba(255,255,255,0.1); }

        .option-btn.correct { background-color: var(--brand2); color: #07101a; border-color: transparent;}
        .option-btn.wrong { background-color: #ef4444; opacity: 0.5; border-color: transparent;}
    </style>
</head>
<body>

    <div class="wrap">
        <div class="dashboard-layout">
            
            <div>
                <div class="game-wrapper" id="game-screen">
                    <div class="header-stats">
                        <div class="timer">⏱ <span id="time">60</span>s</div>
                        <div class="score">⭐ <span id="score">0</span></div>
                    </div>

                    <h2 id="question-text" style="font-family: 'Nunito';">Loading Dinosaurs...</h2>
                    
                    <div class="dino-image-container">
                        <img id="dino-display" class="dino-img" src="" alt="Dinosaur" style="display: none;">
                    </div>
                    <!-- Add this new attribution line -->
                    <div id="attribution-text" style="font-size: 0.75rem; color: var(--muted); margin-bottom: 20px; display: none;"></div>

                    <div class="options-grid" id="options">
                        </div>
                </div>

                <div class="game-wrapper" id="game-over-screen" style="display: none;">
                    <h1>Time's Up!</h1>
                    <h2>You identified <span id="final-score" style="color: var(--brand);">0</span> Dinosaurs!</h2>
                    <p>Paleontology Rank: <strong id="rank" style="color: var(--purple);">Egg</strong></p>
                    <button class="option-btn" style="background-color: var(--purple); color: white; margin-top: 20px;" onclick="startGame()">Play Again</button>
                </div>
            </div>

            <div class="achievements-panel">
                <h2>🏆 Trophies</h2>
                <div class="user-progress">
                    <div style="display: flex; justify-content: space-between;">
                        <span id="levelText" style="font-weight: bold;">Level 1 Rookie</span>
                        <span id="xpText" style="color: var(--muted); font-size: 0.8rem;">0 / 1000 XP</span>
                    </div>
                    <div class="xp-bar"><div class="xp-fill" id="xpBarFill" style="width: 0%;"></div></div>
                </div>
                <div class="achievement-list" id="achievementsList">
                     <div class="achievement-item locked">
                        <div class="achievement-badge">🦕</div>
                        <div class="achievement-info">
                            <h4>Dino Master</h4>
                            <p>Identify 10 Dinosaurs correctly</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/ui.js"></script>

    <script>
        let dinosaurDB = [];
        let currentDino;
        let score = 0;
        let timeLeft = 60;
        let timerInterval;
        let isRevealed = false;
        let streak = 0;

        const timeEl = document.getElementById('time');
        const scoreEl = document.getElementById('score');
        const dinoDisplay = document.getElementById('dino-display');
        const optionsContainer = document.getElementById('options');
        const questionText = document.getElementById('question-text');

        // 1. Fetch and Parse the CSV
        async function loadDinosaurCSV() {
            try {
                const response = await fetch('dinos.csv');
                if (!response.ok) throw new Error("CSV not found");
                
                const text = await response.text();
                
                // Split by newline and remove the header row
                const rows = text.split('\n').map(r => r.trim()).filter(r => r);
                const dataRows = rows.slice(1); 

                // Map CSV row logic: url, option1, option2, option3, option4, correct
                dinosaurDB = dataRows.map(row => {
                    const cols = row.split(',').map(c => c.trim());
                    if (cols.length >= 7) {
                        return {
                            img: cols[0],
                            options: [cols[1], cols[2], cols[3], cols[4]],
                            name: cols[5],
                            author: cols[6] // The new column!
                        };
                    }
                    return null;
                }).filter(d => d !== null);

                if(dinosaurDB.length > 0) {
                    startGame();
                } else {
                    questionText.innerText = "Error: No valid dinosaurs in CSV";
                }
            } catch (error) {
                console.error(error);
                questionText.innerText = "Please create a 'dinos.csv' file!";
            }
        }

        // 2. Gameplay Loop
        function startGame() {
            score = 0;
            timeLeft = 60;
            streak = 0;
            scoreEl.innerText = score;
            timeEl.innerText = timeLeft;
            
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('game-over-screen').style.display = 'none';

            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            
            loadNextDinosaur();
        }

        function updateTimer() {
            timeLeft--;
            timeEl.innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }

        function loadNextDinosaur() {
            isRevealed = false;
            dinoDisplay.style.display = 'block';
            dinoDisplay.classList.add('silhouette');
            document.getElementById('attribution-text').style.display = 'none'; // Hide attribution
            questionText.innerText = "Who's That Dinosaur?";
            
            currentDino = dinosaurDB[Math.floor(Math.random() * dinosaurDB.length)];
            dinoDisplay.src = currentDino.img;

            // Randomize options order so the correct answer isn't always in the same spot
            let shuffledOptions = [...currentDino.options].sort(() => Math.random() - 0.5);

            optionsContainer.innerHTML = '';
            shuffledOptions.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => checkAnswer(option, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedName, btnElement) {
            if (isRevealed) return; 
            isRevealed = true;

            const buttons = document.querySelectorAll('.option-btn');
            
            if (selectedName === currentDino.name) {
                btnElement.classList.add('correct');
                score++;
                streak++;
                timeLeft += 3; // Time bonus
                
                scoreEl.innerText = score;
                timeEl.style.color = 'var(--brand2)';
                timeEl.innerText = `+3s`;
                setTimeout(() => { timeEl.style.color = ''; timeEl.innerText = timeLeft; }, 500);

                questionText.innerText = `It's ${currentDino.name}!`;

                if (streak % 5 === 0) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else {
                btnElement.classList.add('wrong');
                streak = 0;
                questionText.innerText = `Nope! It's ${currentDino.name}!`;
                
                buttons.forEach(b => {
                    if (b.innerText === currentDino.name) b.classList.add('correct');
                });
            }

            dinoDisplay.classList.remove('silhouette');

            // Show compliant CC BY 4.0 attribution
            const attributionEl = document.getElementById('attribution-text');
            attributionEl.innerHTML = `Original image by ${currentDino.author} / <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" style="color: inherit; text-decoration: underline;">CC BY 4.0</a> / Modified from original`;
            attributionEl.style.display = 'block';
            
            setTimeout(loadNextDinosaur, 1500);
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            
            let rank = "Egg";
            if(score > 5) rank = "Hatchling";
            if(score > 15) rank = "Raptor Rider";
            if(score > 30) rank = "T-Rex Master!";
            document.getElementById('rank').innerText = rank;

            // Optional: Connect to your existing API logic to save XP
            // fetch('/api/unlock-achievement', { ... }) 
        }

        // Boot up by loading the CSV
        window.onload = loadDinosaurCSV;
    </script>
</body>
</html>
